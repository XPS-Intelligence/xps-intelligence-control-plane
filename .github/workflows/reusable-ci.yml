name: reusable-ci

on:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON manifests
        run: |
          node -e "JSON.parse(require('fs').readFileSync('templates/runtime-repo/template.manifest.json','utf8')); JSON.parse(require('fs').readFileSync('docs/03-checklists/INTERACTIVE_FOUNDATION_CHECKLIST.json','utf8')); console.log('json-ok')"
      - name: Validate foundation docs and memory
        shell: pwsh
        run: |
          ./bootstrap/validate-foundation.ps1
